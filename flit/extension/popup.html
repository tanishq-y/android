<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flit</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      width: 320px;
      min-height: 200px;
      background: #F7F8FA;
      color: #1A1A1A;
      font-size: 14px;
    }

    .header {
      background: #fff;
      border-bottom: 1px solid #E5E7EB;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo {
      width: 28px;
      height: 28px;
      background: #0D9F6F;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 700;
      font-size: 13px;
    }

    .header h1 {
      font-size: 17px;
      font-weight: 600;
      color: #1A1A1A;
      letter-spacing: -0.3px;
    }

    .body { padding: 12px 16px; }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      color: #9CA3AF;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .platform-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }

    .platform-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #fff;
      border: 1px solid #E5E7EB;
      border-radius: 10px;
      padding: 10px 12px;
    }

    .platform-info { display: flex; align-items: center; gap: 8px; }

    .platform-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .platform-name { font-weight: 500; font-size: 13px; }
    .platform-detail { font-size: 11px; color: #9CA3AF; }

    .status-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 12px;
    }

    .status-logged-in  { background: #D1FAE5; color: #059669; }
    .status-logged-out { background: #FEE2E2; color: #DC2626; }
    .status-loading    { background: #F3F4F6; color: #9CA3AF; }

    .open-btn {
      display: block;
      width: 100%;
      padding: 10px;
      background: #0D9F6F;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      margin-top: 4px;
    }

    .open-btn:hover { background: #097A54; }

    .footer {
      padding: 8px 16px 12px;
      font-size: 11px;
      color: #9CA3AF;
      text-align: center;
    }

    .refresh-btn {
      background: none;
      border: 1px solid #E5E7EB;
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 11px;
      color: #6B7280;
      cursor: pointer;
      margin-top: 4px;
    }

    .refresh-btn:hover { background: #F3F4F6; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">F</div>
    <h1>flit</h1>
  </div>

  <div class="body">
    <div class="section-label">Platform status</div>
    <div class="platform-list" id="platform-list">
      <!-- Populated by popup.js -->
    </div>

    <a href="http://localhost:5173" target="_blank" class="open-btn" id="open-app">
      Open Flit →
    </a>

    <div style="text-align:center; margin-top: 8px;">
      <button class="refresh-btn" id="refresh-btn">↻ Refresh status</button>
    </div>
  </div>

  <div class="footer">
    Search uses your real session — no passwords stored.
  </div>

  <script src="popup.js"></script>
</body>
</html>
